version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: enrollment-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: enrollment_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enrollment-network

  redis:
    image: redis:7-alpine
    container_name: enrollment-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enrollment-network

  backend:
    build: ./backend
    container_name: enrollment-backend
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: enrollment_db
      MYSQL_USER: root
      MYSQL_PASSWORD: Armaan@28012005
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - enrollment-network

  frontend:
    build: ./frontend
    container_name: enrollment-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - enrollment-network

volumes:
  mysql-data:
  redis-data:


networks:
  enrollment-network:
    driver: bridge
